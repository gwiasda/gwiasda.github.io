<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wipptal - Sterzing und Umgebung | Wochenvorhersage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            color: #333;
        }

        /* Header */
        .header {
            background: #1a5276;
            color: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.2rem; font-weight: 700; }
        .header .info-btn {
            background: #2980b9;
            color: white;
            border: none;
            padding: 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .sub-header {
            padding: 12px 20px;
            border-bottom: 2px solid #1a5276;
        }
        .sub-header h2 { font-size: 1rem; color: #333; }
        .sub-header .date { font-size: 0.85rem; color: #666; margin-top: 2px; }

        /* Main grid */
        .forecast { padding: 0 12px; max-width: 800px; margin: 0 auto; }

        /* Section titles */
        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1a5276;
            padding: 12px 8px 6px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 4px;
        }

        /* Day header row */
        .day-row {
            display: grid;
            text-align: center;
            border-bottom: 1px solid #ddd;
            padding: 8px 0;
        }
        .day-label {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1a5276;
        }

        /* Weather icon row */
        .icon-row {
            display: grid;
            text-align: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .weather-icon {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .weather-icon svg {
            width: 44px;
            height: 44px;
        }
        .weather-icon .fallback {
            font-size: 1.3rem;
            color: #888;
        }

        /* Precipitation probability bars */
        .precip-section { padding: 4px 0 8px; }
        .precip-header {
            display: grid;
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            padding: 0 0 2px;
        }
        .precip-wrapper {
            display: grid;
            grid-template-columns: 30px 1fr;
            border-bottom: 1px solid #ddd;
        }
        .precip-y-axis {
            position: relative;
            height: 80px;
        }
        .precip-y-label {
            position: absolute;
            right: 4px;
            font-size: 0.7rem;
            color: #666;
            font-weight: 700;
            transform: translateY(-50%);
        }
        .precip-chart-area {
            display: grid;
            position: relative;
        }
        .day-bars {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 1px;
            height: 80px;
            padding: 0 4px;
            position: relative;
        }
        .bar {
            flex: 1;
            max-width: 10px;
            background: #2980b9;
            border-radius: 1px 1px 0 0;
            min-height: 1px;
        }
        .precip-grid-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px dotted #ccc;
            z-index: 0;
        }

        /* Precipitation amount row */
        .amount-row {
            display: grid;
            text-align: center;
            padding: 6px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
            color: #555;
        }

        /* Sunshine row */
        .sunshine-row {
            display: grid;
            text-align: center;
            padding: 6px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
            color: #b8860b;
        }

        /* Temperature row */
        .temp-row {
            display: grid;
            text-align: center;
            padding: 10px 0;
            gap: 6px;
            border-bottom: 1px solid #ddd;
        }
        .temp-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .temp-val {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.95rem;
            min-width: 42px;
        }
        .temp-max { background: #e74c3c; color: white; }
        .temp-min { background: #3498db; color: white; }

        /* Snow row */
        .snow-row {
            display: grid;
            text-align: center;
            padding: 6px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        /* Föhn chart */
        .foehn-wrap {
            padding: 6px 0 4px;
            border-bottom: 1px solid #ddd;
        }
        .foehn-wrap svg {
            display: block;
            width: 100%;
            height: auto;
        }
        .foehn-legend {
            font-size: 0.7rem;
            color: #666;
            padding: 2px 6px 8px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        .foehn-status {
            font-size: 0.8rem;
            color: #888;
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        /* Footer */
        .footer-info {
            background: #f8f9fa;
            border-top: 2px solid #1a5276;
            padding: 12px 20px;
            margin-top: 16px;
        }
        .footer-info .timestamp {
            font-size: 0.85rem;
            font-weight: 700;
            color: #333;
        }
        .footer-info a { color: #2980b9; text-decoration: none; }
        .footer-info a:hover { text-decoration: underline; }

        .loading { text-align: center; padding: 60px; color: #999; }

        /* Dropdown */
        .header select {
            padding: 6px 10px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            background: rgba(255,255,255,0.15);
            color: white;
            cursor: pointer;
            max-width: 220px;
        }
        .header select option { color: #333; background: #fff; }

        /* Mobile (< 600px) */
        @media (max-width: 600px) {
            .header { padding: 10px 12px; gap: 8px; }
            .header h1 { font-size: 0.95rem; }
            .header select {
                font-size: 0.8rem;
                padding: 4px 6px;
                max-width: 50%;
            }
            .sub-header { padding: 8px 12px; }
            .sub-header .date { font-size: 0.75rem; }

            .forecast { padding: 0 4px; }
            .section-title { font-size: 0.8rem; padding: 10px 4px 4px; }
            .day-label { font-size: 0.8rem; }

            .day-row { padding: 6px 0; }
            .icon-row { padding: 4px 0; }
            .weather-icon svg { width: 30px; height: 30px; }

            .precip-header { font-size: 0.55rem; }
            .precip-wrapper { grid-template-columns: 22px 1fr; }
            .precip-y-axis, .day-bars { height: 60px; }
            .precip-y-label { font-size: 0.6rem; }
            .day-bars { padding: 0 1px; gap: 1px; }
            .bar { max-width: 4px; }

            .amount-row, .sunshine-row, .snow-row {
                font-size: 0.7rem;
                padding: 5px 0;
            }
            .temp-row { padding: 6px 0; gap: 2px; }
            .temp-val {
                padding: 2px 4px;
                font-size: 0.75rem;
                min-width: 28px;
                border-radius: 3px;
            }

            .foehn-legend {
                font-size: 0.6rem;
                padding: 2px 4px 6px;
            }

            .footer-info { padding: 10px 12px; }
            .footer-info .timestamp { font-size: 0.75rem; }
            .footer-info a { font-size: 0.75rem; }
        }
    </style>

        return document.importNode(root, true);
    }

    function parseData(raw) {
        var startDate = new Date(raw.start);
        var daily = raw['1440'];
        var hourly = raw['180'];

        var dayKeys = Object.keys(daily).sort(function(a, b) { return Number(a) - Number(b); });
        var allDays = dayKeys.map(function(key, i) {
            var d = daily[key];
            var date = new Date(startDate);
            date.setHours(0, 0, 0, 0);
            date.setDate(date.getDate() + i);
            return {
                date: date,
                dayName: date.toLocaleDateString('de-AT', { weekday: 'short' }),
                dateLabel: date.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit' }),
                tempMin: d.temperature_minimum,
                tempMax: d.temperature_maximum,
                rainfall: d.rain_fall,
                freshSnow: d.fresh_snow,
                snowLevel: d.snow_level,
                rainProb: d.rain_probability,
                sunshine: d.sunshine_duration,
                sky: d.sky_condition
            };
        });

        var hourKeys = Object.keys(hourly).sort(function(a, b) { return Number(a) - Number(b); });
        var hoursByAll = [];
        for (var di = 0; di < allDays.length; di++) hoursByAll.push([]);
        hourKeys.forEach(function(key, i) {
            var dayIdx = Math.floor(i / 8);
            if (dayIdx < allDays.length) hoursByAll[dayIdx].push(hourly[key]);
        });

        // Skip past days so the first column is always today (or later).
        var today = new Date();
        today.setHours(0, 0, 0, 0);
        var skip = 0;
        while (skip < allDays.length && allDays[skip].date.getTime() < today.getTime()) skip++;
        var days = allDays.slice(skip);
        var hoursByDay = hoursByAll.slice(skip);

        return { days: days, hoursByDay: hoursByDay, startDate: startDate };
    }

    function appendIcon(parent, sky) {
        var box = el('div', 'weather-icon');
        var svgNode = parseSvg(SKY_ICONS[String(sky || '').toLowerCase()]);
        if (svgNode) {
            box.appendChild(svgNode);
        } else {
            var fb = el('span', 'fallback');
            fb.textContent = '–';
            box.appendChild(fb);
        }
        parent.appendChild(box);
        return box;
    }

    function renderFoehn(parent, days) {
        parent.appendChild(txt('div', 'section-title', 'Föhndiagramm: Luftdruckdifferenz Bozen – Innsbruck (hPa)'));

        if (!PRESSURE_DATA || !days.length) {
            parent.appendChild(txt('div', 'foehn-status', 'Föhndaten nicht verfügbar'));
            return;
        }

        var dayStart = new Date(days[0].date).getTime();
        var dayEnd = new Date(days[days.length - 1].date);
        dayEnd.setDate(dayEnd.getDate() + 1);
        var dayEndMs = dayEnd.getTime();

        var pts = PRESSURE_DATA
            .map(function(p) { return { t: new Date(p.date).getTime(), v: Number(p.value) }; })
            .filter(function(p) { return p.t >= dayStart && p.t <= dayEndMs && !isNaN(p.v); });

        if (pts.length < 2) {
            parent.appendChild(txt('div', 'foehn-status', 'Föhndaten nicht verfügbar'));
            return;
        }

        var W = 600, H = 160;
        var mxL = 24, mxR = 14, mtop = 8, mbot = 22;
        var plotW = W - mxL - mxR;
        var plotH = H - mtop - mbot;

        var maxV = pts.reduce(function(a, p) { return Math.max(a, p.v); }, 0);
        var minV = pts.reduce(function(a, p) { return Math.min(a, p.v); }, 0);
        var bound = Math.max(6, Math.ceil(Math.max(Math.abs(minV), Math.abs(maxV))));
        var yMin = -bound, yMax = bound;

        var spanT = dayEndMs - dayStart || 1;
        function xT(t) { return mxL + ((t - dayStart) / spanT) * plotW; }
        function yV(v) { return mtop + (1 - (v - yMin) / (yMax - yMin)) * plotH; }

        var wrap = el('div', 'foehn-wrap');
        var svg = svgEl('svg', {
            viewBox: '0 0 ' + W + ' ' + H,
            preserveAspectRatio: 'none',
            width: '100%',
            height: H + 'px'
        });

        var zeroY = yV(0);
        var plotLeft = mxL;
        var plotRight = W - mxR;
        var plotTop = mtop;
        var plotBot = H - mbot;

        // Background bands: red above zero (Südföhn), blue below zero (Nordföhn)
        if (zeroY > plotTop) {
            svg.appendChild(svgEl('rect', {
                x: plotLeft, y: plotTop,
                width: plotW, height: zeroY - plotTop,
                fill: '#e74c3c',
                'fill-opacity': 0.06
            }));
        }
        if (plotBot > zeroY) {
            svg.appendChild(svgEl('rect', {
                x: plotLeft, y: zeroY,
                width: plotW, height: plotBot - zeroY,
                fill: '#2980b9',
                'fill-opacity': 0.06
            }));
        }

        // Y grid + labels
        for (var v = yMin; v <= yMax; v++) {
            var isZero = v === 0;
            var line = svgEl('line', {
                x1: plotLeft, x2: plotRight,
                y1: yV(v), y2: yV(v),
                stroke: isZero ? '#1a5276' : '#eee',
                'stroke-width': isZero ? 1 : 0.5
            });
            if (!isZero) line.setAttribute('stroke-dasharray', '2,2');
            svg.appendChild(line);

            var lbl = svgEl('text', {
                x: plotLeft - 4, y: yV(v) + 3,
                'text-anchor': 'end',
                'font-size': 8,
                fill: '#888'
            });
            lbl.textContent = (v > 0 ? '+' : '') + v;
            svg.appendChild(lbl);
        }

        // Nordföhn zone: highlight band between -3 and -6 hPa
        var nfTop = Math.max(-3, yMin);
        var nfBot = Math.max(-6, yMin);
        if (nfTop > nfBot) {
            svg.appendChild(svgEl('rect', {
                x: plotLeft, y: yV(nfTop),
                width: plotW, height: yV(nfBot) - yV(nfTop),
                fill: '#1a5276',
                'fill-opacity': 0.12
            }));
            [nfTop, nfBot].forEach(function(v) {
                svg.appendChild(svgEl('line', {
                    x1: plotLeft, x2: plotRight,
                    y1: yV(v), y2: yV(v),
                    stroke: '#1a5276',
                    'stroke-width': 0.7,
                    'stroke-dasharray': '4,3',
                    opacity: 0.7
                }));
            });
            var nfLabel = svgEl('text', {
                x: plotLeft + 6,
                y: (yV(nfTop) + yV(nfBot)) / 2 + 3,
                'text-anchor': 'start',
                'font-size': 9,
                'font-weight': 700,
                fill: '#1a5276',
                opacity: 0.85
            });
            nfLabel.textContent = 'Nordföhn';
            svg.appendChild(nfLabel);
        }

        // Day separators + labels
        days.forEach(function(d, i) {
            var ds = new Date(d.date).getTime();
            if (i > 0) {
                svg.appendChild(svgEl('line', {
                    x1: xT(ds), x2: xT(ds),
                    y1: plotTop, y2: plotBot,
                    stroke: '#ccc',
                    'stroke-width': 0.5
                }));
            }
            var dCenter = ds + 12 * 3600 * 1000;
            if (dCenter >= dayStart && dCenter <= dayEndMs) {
                var dl = svgEl('text', {
                    x: xT(dCenter), y: H - 6,
                    'text-anchor': 'middle',
                    'font-size': 9,
                    fill: '#1a5276',
                    'font-weight': 700
                });
                dl.textContent = d.dayName;
                svg.appendChild(dl);
            }
        });

        // Split area fill: red above zero (Südföhn), blue below zero (Nordföhn)
        // Same closed area path is rendered twice with two opposing clip rects.
        var clipUid = 'foehn-' + Math.random().toString(36).slice(2, 8);
        var defs = svgEl('defs');

        var clipPos = svgEl('clipPath', { id: clipUid + '-pos' });
        clipPos.appendChild(svgEl('rect', {
            x: 0, y: plotTop,
            width: W, height: Math.max(0, zeroY - plotTop)
        }));
        defs.appendChild(clipPos);

        var clipNeg = svgEl('clipPath', { id: clipUid + '-neg' });
        clipNeg.appendChild(svgEl('rect', {
            x: 0, y: zeroY,
            width: W, height: Math.max(0, plotBot - zeroY)
        }));
        defs.appendChild(clipNeg);
        svg.appendChild(defs);

        var areaD = 'M' + xT(pts[0].t).toFixed(1) + ',' + zeroY.toFixed(1);
        pts.forEach(function(p) {
            areaD += ' L' + xT(p.t).toFixed(1) + ',' + yV(p.v).toFixed(1);
        });
        areaD += ' L' + xT(pts[pts.length - 1].t).toFixed(1) + ',' + zeroY.toFixed(1) + ' Z';

        svg.appendChild(svgEl('path', {
            d: areaD,
            fill: '#e74c3c',
            'fill-opacity': 0.35,
            'clip-path': 'url(#' + clipUid + '-pos)'
        }));
        svg.appendChild(svgEl('path', {
            d: areaD,
            fill: '#2980b9',
            'fill-opacity': 0.35,
            'clip-path': 'url(#' + clipUid + '-neg)'
        }));

        // Curve on top
        var pathD = '';
        pts.forEach(function(p, i) {
            pathD += (i === 0 ? 'M' : 'L') + xT(p.t).toFixed(1) + ',' + yV(p.v).toFixed(1) + ' ';
        });
        svg.appendChild(svgEl('path', {
            d: pathD,
            fill: 'none',
            stroke: '#1a5276',
            'stroke-width': 1.5
        }));

        wrap.appendChild(svg);
        parent.appendChild(wrap);

        var legend = el('div', 'foehn-legend');
        var negSpan = txt('span', '', '');
        var negSwatch = el('span');
        negSwatch.style.cssText = 'display:inline-block;width:10px;height:10px;background:#1a5276;opacity:0.4;margin-right:4px;vertical-align:middle;';
        negSpan.appendChild(negSwatch);
        negSpan.appendChild(document.createTextNode('Nordföhn-Zone (−3 bis −6 hPa)'));
        legend.appendChild(negSpan);
        parent.appendChild(legend);
    }

    function render(raw) {
        var data = parseData(raw);
        var days = data.days;
        var hoursByDay = data.hoursByDay;
        var nDays = days.length;

        var content = document.getElementById('content');
        content.textContent = '';

        if (!nDays) {
            var warn = el('div', 'loading');
            warn.textContent = 'Keine aktuellen Vorhersagedaten verfügbar.';
            content.appendChild(warn);
            return;
        }

        var sub = el('div', 'sub-header');
        sub.appendChild(txt('div', 'date',
            'Vorhersage vom ' + days[0].date.toLocaleDateString('de-AT', {
                weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric'
            })
        ));
        content.appendChild(sub);

        var forecast = el('div', 'forecast');

        // Day header row
        var dayRow = el('div', 'day-row');
        setCols(dayRow, nDays);
        days.forEach(function(d) {
            var label = el('div', 'day-label');
            label.textContent = d.dayName;
            dayRow.appendChild(label);
        });
        forecast.appendChild(dayRow);

        // Weather icons
        var iconRow = el('div', 'icon-row');
        setCols(iconRow, nDays);
        days.forEach(function(d) { appendIcon(iconRow, d.sky); });
        forecast.appendChild(iconRow);

        // -- Niederschlagswahrscheinlichkeit --
        forecast.appendChild(txt('div', 'section-title', 'Niederschlagswahrscheinlichkeit'));

        var timeHeader = el('div', 'precip-header');
        timeHeader.style.gridTemplateColumns = '30px repeat(' + nDays + ', 1fr)';
        timeHeader.appendChild(el('div'));
        days.forEach(function() {
            var cell = el('div');
            cell.textContent = '6  12 18h';
            timeHeader.appendChild(cell);
        });
        forecast.appendChild(timeHeader);

        var precipWrapper = el('div', 'precip-wrapper');

        var yAxis = el('div', 'precip-y-axis');
        [90, 60, 30].forEach(function(pct) {
            var label = el('span', 'precip-y-label');
            label.textContent = pct;
            label.style.top = ((100 - pct) / 100 * 80) + 'px';
            yAxis.appendChild(label);
        });
        var pctLabel = el('span', 'precip-y-label');
        pctLabel.textContent = '%';
        pctLabel.style.bottom = '-14px';
        pctLabel.style.top = 'auto';
        yAxis.appendChild(pctLabel);
        precipWrapper.appendChild(yAxis);

        var chartArea = el('div', 'precip-chart-area');
        setCols(chartArea, nDays);
        [90, 60, 30].forEach(function(pct) {
            var line = el('div', 'precip-grid-line');
            line.style.top = ((100 - pct) / 100 * 80) + 'px';
            chartArea.appendChild(line);
        });

        days.forEach(function(d, di) {
            var dayBars = el('div', 'day-bars');
            var slots = hoursByDay[di] || [];
            slots.forEach(function(slot) {
                var bar = el('div', 'bar');
                var prob = Number(slot.rain_probability) || 0;
                var h = Math.max(1, (prob / 100) * 78);
                bar.style.height = h + 'px';
                var alpha = 0.3 + (prob / 100) * 0.7;
                bar.style.background = 'rgba(41,128,185,' + alpha + ')';
                dayBars.appendChild(bar);
            });
            chartArea.appendChild(dayBars);
        });
        precipWrapper.appendChild(chartArea);
        forecast.appendChild(precipWrapper);

        // -- Niederschlagsmenge --
        forecast.appendChild(txt('div', 'section-title', 'Niederschlagsmenge'));
        var amountRow = el('div', 'amount-row');
        setCols(amountRow, nDays);
        days.forEach(function(d) {
            var cell = el('div');
            if (d.rainfall === 0) {
                cell.textContent = '0 mm';
            } else if (d.rainfall < 1) {
                cell.textContent = '0 - 1 mm';
            } else if (d.rainfall < 5) {
                cell.textContent = '0 - 5 mm';
            } else if (d.rainfall < 10) {
                cell.textContent = '5 - 10 mm';
            } else if (d.rainfall < 15) {
                cell.textContent = '5 - 15 mm';
            } else if (d.rainfall < 30) {
                cell.textContent = '15 - 30 mm';
            } else {
                cell.textContent = '> 30 mm';
            }
            amountRow.appendChild(cell);
        });
        forecast.appendChild(amountRow);

        // -- Sonnenstunden --
        forecast.appendChild(txt('div', 'section-title', 'Sonnenstunden'));
        var sunRow = el('div', 'sunshine-row');
        setCols(sunRow, nDays);
        days.forEach(function(d) {
            var cell = el('div');
            var hrs = Number(d.sunshine);
            cell.textContent = (isNaN(hrs) ? '–' : hrs.toFixed(1) + ' h');
            sunRow.appendChild(cell);
        });
        forecast.appendChild(sunRow);

        // -- Temperaturen Min/Max --
        forecast.appendChild(txt('div', 'section-title', 'Temperaturen: Min/Max'));
        var tempRow = el('div', 'temp-row');
        setCols(tempRow, nDays);
        days.forEach(function(d) {
            var box = el('div', 'temp-box');
            var maxVal = el('span', 'temp-val temp-max');
            maxVal.textContent = d.tempMax + '°';
            box.appendChild(maxVal);
            var minVal = el('span', 'temp-val temp-min');
            minVal.textContent = d.tempMin + '°';
            box.appendChild(minVal);
            tempRow.appendChild(box);
        });
        forecast.appendChild(tempRow);

        // -- Föhndiagramm --
        renderFoehn(forecast, days);

        // -- Schneefallgrenze --
        forecast.appendChild(txt('div', 'section-title', 'Schneefallgrenze'));
        var snowRow = el('div', 'snow-row');
        setCols(snowRow, nDays);
        days.forEach(function(d) {
            var cell = el('div');
            cell.textContent = d.snowLevel + ' m';
            snowRow.appendChild(cell);
        });
        forecast.appendChild(snowRow);

        // -- Neuschnee --
        forecast.appendChild(txt('div', 'section-title', 'Neuschnee'));
        var newSnowRow = el('div', 'snow-row');
        setCols(newSnowRow, nDays);
        days.forEach(function(d) {
            var cell = el('div');
            cell.textContent = d.freshSnow > 0 ? d.freshSnow + ' cm' : '-';
            newSnowRow.appendChild(cell);
        });
        forecast.appendChild(newSnowRow);

        content.appendChild(forecast);

        // Footer
        var footer = el('div', 'footer-info');
        var ts = el('div', 'timestamp');
        ts.textContent = 'Ausgegeben am: ' + new Date().toLocaleDateString('de-AT', {
            day: '2-digit', month: '2-digit', year: 'numeric'
        }) + ', ' + new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit' });
        footer.appendChild(ts);

        var link = el('div');
        link.style.marginTop = '4px';
        link.style.fontSize = '0.8rem';
        var a = el('a');
        a.href = 'https://wetter.provinz.bz.it/de/gemeindewetter/sterzing?tl=144000000';
        a.textContent = 'Originalseite auf wetter.provinz.bz.it';
        var b = el('p');
        b.textContent = 'Privatprojekt, nur für den Eigengebrauch bestimmt (simuliert altes layout)';
        b.style.fontSize = '8px';
        link.appendChild(a);
        footer.appendChild(link);
        footer.appendChild(b);

        content.appendChild(footer);
    }

    function loadMunicipality(id) {
        var mun = MUNICIPALITIES.find(function(m) { return m.id === id; });
        var name = mun ? mun.n : 'Gemeindewetter';
        document.getElementById('title').textContent = 'Gemeindewetter - ' + name;

        var content = document.getElementById('content');
        content.textContent = '';
        var loading = el('div', 'loading');
        loading.textContent = 'Wetterdaten werden geladen...';
        content.appendChild(loading);

        var forecastPromise = fetch(BASE_URL + id + '.json?cb=' + Date.now())
            .then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            });

        Promise.all([forecastPromise, skyPromise, pressurePromise])
            .then(function(results) { render(results[0]); })
            .catch(function(err) {
                content.textContent = '';
                var errDiv = el('div', 'loading');
                errDiv.style.color = '#e74c3c';
                errDiv.textContent = 'Fehler: ' + err.message;
                content.appendChild(errDiv);
            });
    }

    var select = document.getElementById('municipality-select');
    MUNICIPALITIES.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.n;
        if (m.id === DEFAULT_ID) opt.selected = true;
        select.appendChild(opt);
    });
    select.addEventListener('change', function() {
        loadMunicipality(this.value);
    });

    loadMunicipality(DEFAULT_ID);
    </script>
