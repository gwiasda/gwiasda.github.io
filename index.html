    <meta charset="UTF-8">

    <title>Wipptal - Sterzing und Umgebung | Wochenvorhersage</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #fff;
            color: #333;
        }

        /* Header */
        .header {
            background: #1a5276;
            color: white;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.2rem; font-weight: 700; }
        .header .info-btn {
            background: #2980b9;
            color: white;
            border: none;
            padding: 6px 16px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 4px;
        }

        .sub-header {
            padding: 12px 20px;
            border-bottom: 2px solid #1a5276;
        }
        .sub-header h2 { font-size: 1rem; color: #333; }
        .sub-header .date { font-size: 0.85rem; color: #666; margin-top: 2px; }

        /* Main grid */
        .forecast { padding: 0 12px; max-width: 800px; margin: 0 auto; }

        /* Section titles */
        .section-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #1a5276;
            padding: 12px 8px 6px;
            border-bottom: 1px solid #ddd;
            margin-bottom: 4px;
        }

        /* Day header row */
        .day-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            text-align: center;
            border-bottom: 1px solid #ddd;
            padding: 8px 0;
        }
        .day-label {
            font-weight: 700;
            font-size: 0.95rem;
            color: #1a5276;
        }

        /* Weather icon row */
        .icon-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            text-align: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .weather-icon { font-size: 2.2rem; line-height: 1; }

        /* Precipitation probability bars */
        .precip-section { padding: 4px 0 8px; }
        .precip-header {
            display: grid;
            grid-template-columns: 30px repeat(6, 1fr);
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            padding: 0 0 2px;
        }
        .precip-wrapper {
            display: grid;
            grid-template-columns: 30px 1fr;
            border-bottom: 1px solid #ddd;
        }
        .precip-y-axis {
            position: relative;
            height: 80px;
        }
        .precip-y-label {
            position: absolute;
            right: 4px;
            font-size: 0.7rem;
            color: #666;
            font-weight: 700;
            transform: translateY(-50%);
        }
        .precip-chart-area {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            position: relative;
        }
        .day-bars {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 1px;
            height: 80px;
            padding: 0 4px;
            position: relative;
        }
        .bar {
            flex: 1;
            max-width: 10px;
            background: #2980b9;
            border-radius: 1px 1px 0 0;
            min-height: 1px;
        }
        .precip-grid-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px dotted #ccc;
            z-index: 0;
        }

        /* Precipitation amount row */
        .amount-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            text-align: center;
            padding: 6px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
            color: #555;
        }

        /* Sunshine row */
        .sunshine-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            text-align: center;
            padding: 6px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
            color: #b8860b;
        }

        /* Temperature row */
        .temp-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            text-align: center;
            padding: 10px 0;
            gap: 6px;
            border-bottom: 1px solid #ddd;
        }
        .temp-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .temp-val {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.95rem;
            min-width: 42px;
        }
        .temp-max { background: #e74c3c; color: white; }
        .temp-min { background: #3498db; color: white; }

        /* Frost row */
        .frost-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            text-align: center;
            padding: 8px 0;
            border-bottom: 1px solid #ddd;
        }
        .frost-cell {
            display: flex;
            justify-content: center;
            gap: 2px;
        }
        .frost-block {
            width: 14px;
            height: 14px;
            border-radius: 2px;
        }
        .frost-none { background: #27ae60; }
        .frost-light { background: #f39c12; }
        .frost-moderate { background: #e67e22; }
        .frost-severe { background: #2980b9; }
        .frost-extreme { background: #1a5276; }

        /* Snow row */
        .snow-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            text-align: center;
            padding: 6px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
            color: #7f8c8d;
        }

        /* Wind row */
        .wind-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            text-align: center;
            padding: 6px 0;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
            color: #555;
        }

        /* Footer */
        .footer-info {
            background: #f8f9fa;
            border-top: 2px solid #1a5276;
            padding: 12px 20px;
            margin-top: 16px;
        }
        .footer-info .timestamp {
            font-size: 0.85rem;
            font-weight: 700;
            color: #333;
        }
        .footer-info a { color: #2980b9; text-decoration: none; }
        .footer-info a:hover { text-decoration: underline; }

        .loading { text-align: center; padding: 60px; color: #999; }

        /* Dropdown */
        .header select {
            padding: 6px 10px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 4px;
            background: rgba(255,255,255,0.15);
            color: white;
            cursor: pointer;
            max-width: 220px;
        }
        .header select option { color: #333; background: #fff; }
    </style>

    function el(tag, cls) {
        var e = document.createElement(tag);
        if (cls) e.className = cls;
        return e;
    }

    function txt(tag, cls, text) {
        var e = el(tag, cls);
        e.textContent = text;
        return e;
    }

    function parseData(raw) {
        var startDate = new Date(raw.start);
        var daily = raw['1440'];
        var hourly = raw['180'];

        var dayKeys = Object.keys(daily).sort(function(a, b) { return Number(a) - Number(b); });
        var days = dayKeys.map(function(key, i) {
            var d = daily[key];
            var date = new Date(startDate);
            date.setDate(date.getDate() + i);
            return {
                date: date,
                dayName: date.toLocaleDateString('de-AT', { weekday: 'short' }),
                dateLabel: date.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit' }),
                tempMin: d.temperature_minimum,
                tempMax: d.temperature_maximum,
                rainfall: d.rain_fall,
                freshSnow: d.fresh_snow,
                windGust: d.wind_gust,
                windSpeed: d.wind_speed,
                snowLevel: d.snow_level,
                freezingLevel: d.freezing_level,
                rainProb: d.rain_probability,
                sunshine: d.sunshine_duration,
                sky: d.sky_condition
            };
        });

        // Group 3h data by day (8 slots per day)
        var hourKeys = Object.keys(hourly).sort(function(a, b) { return Number(a) - Number(b); });
        var hoursByDay = [];
        for (var di = 0; di < days.length; di++) {
            hoursByDay.push([]);
        }
        hourKeys.forEach(function(key, i) {
            var dayIdx = Math.floor(i / 8);
            if (dayIdx < days.length) {
                hoursByDay[dayIdx].push(hourly[key]);
            }
        });

        return { days: days, hoursByDay: hoursByDay, startDate: startDate };
    }

    function getFrostLevel(tempMin) {
        if (tempMin >= 3) return 'frost-none';
        if (tempMin >= 0) return 'frost-light';
        if (tempMin >= -3) return 'frost-moderate';
        if (tempMin >= -7) return 'frost-severe';
        return 'frost-extreme';
    }

    function render(raw) {
        var data = parseData(raw);
        var days = data.days;
        var hoursByDay = data.hoursByDay;

        var content = document.getElementById('content');

        // Sub-header
        var sub = el('div', 'sub-header');
        sub.appendChild(txt('div', 'date',
            'Vorhersage vom ' + days[0].date.toLocaleDateString('de-AT', {
                weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric'
            })
        ));
        content.appendChild(sub);

        var forecast = el('div', 'forecast');

        // Day header row
        var dayRow = el('div', 'day-row');
        days.forEach(function(d) {
            var label = el('div', 'day-label');
            label.textContent = d.dayName;
            dayRow.appendChild(label);
        });
        forecast.appendChild(dayRow);

        // Weather icons
        var iconRow = el('div', 'icon-row');
        days.forEach(function(d) {
            var ic = el('div', 'weather-icon');
            ic.textContent = SKY[d.sky] || '?';
            iconRow.appendChild(ic);
        });
        forecast.appendChild(iconRow);

        // -- Niederschlagswahrscheinlichkeit --
        forecast.appendChild(txt('div', 'section-title', 'Niederschlagswahrscheinlichkeit'));

        // Sub-day time labels (with empty first cell for y-axis column)
        var timeHeader = el('div', 'precip-header');
        timeHeader.appendChild(el('div')); // empty spacer for y-axis
        days.forEach(function() {
            var cell = el('div');
            cell.textContent = '6  12 18h';
            timeHeader.appendChild(cell);
        });
        forecast.appendChild(timeHeader);

        // Wrapper: y-axis + chart area
        var precipWrapper = el('div', 'precip-wrapper');

        // Y-axis with 90%, 60%, 30% labels
        var yAxis = el('div', 'precip-y-axis');
        [90, 60, 30].forEach(function(pct) {
            var label = el('span', 'precip-y-label');
            label.textContent = pct;
            label.style.top = ((100 - pct) / 100 * 80) + 'px';
            yAxis.appendChild(label);
        });
        var pctLabel = el('span', 'precip-y-label');
        pctLabel.textContent = '%';
        pctLabel.style.bottom = '-14px';
        pctLabel.style.top = 'auto';
        yAxis.appendChild(pctLabel);
        precipWrapper.appendChild(yAxis);

        // Bar chart area with grid lines
        var chartArea = el('div', 'precip-chart-area');

        // Grid lines at 30%, 60%, 90%
        [90, 60, 30].forEach(function(pct) {
            var line = el('div', 'precip-grid-line');
            line.style.top = ((100 - pct) / 100 * 80) + 'px';
            chartArea.appendChild(line);
        });

        days.forEach(function(d, di) {
            var dayBars = el('div', 'day-bars');
            var slots = hoursByDay[di] || [];
            slots.forEach(function(slot) {
                var bar = el('div', 'bar');
                var h = Math.max(1, (slot.rain_probability / 100) * 78);
                bar.style.height = h + 'px';
                var alpha = 0.3 + (slot.rain_probability / 100) * 0.7;
                bar.style.background = 'rgba(41,128,185,' + alpha + ')';
                dayBars.appendChild(bar);
            });
            chartArea.appendChild(dayBars);
        });
        precipWrapper.appendChild(chartArea);
        forecast.appendChild(precipWrapper);

        // -- Niederschlagsmenge --
        forecast.appendChild(txt('div', 'section-title', 'Niederschlagsmenge'));
        var amountRow = el('div', 'amount-row');
        days.forEach(function(d) {
            var cell = el('div');
            if (d.rainfall === 0) {
                cell.textContent = '0 mm';
            } else if (d.rainfall < 1) {
                cell.textContent = '0 - 1 mm';
            } else if (d.rainfall < 5) {
                cell.textContent = '0 - 5 mm';
            } else if (d.rainfall < 10) {
                cell.textContent = '5 - 10 mm';
            } else if (d.rainfall < 15) {
                cell.textContent = '5 - 15 mm';
            } else if (d.rainfall < 30) {
                cell.textContent = '15 - 30 mm';
            } else {
                cell.textContent = '> 30 mm';
            }
            amountRow.appendChild(cell);
        });
        forecast.appendChild(amountRow);

        // -- Sonnenscheindauer --
        forecast.appendChild(txt('div', 'section-title', 'Sonnenscheindauer'));
        var sunRow = el('div', 'sunshine-row');
        days.forEach(function(d) {
            var cell = el('div');
            cell.textContent = d.sunshine.toFixed(1) + ' h';
            sunRow.appendChild(cell);
        });
        forecast.appendChild(sunRow);

        // -- Temperaturen --
        forecast.appendChild(txt('div', 'section-title', 'Temperaturen: Min/Max'));
        var tempRow = el('div', 'temp-row');
        days.forEach(function(d) {
            var box = el('div', 'temp-box');

            var maxVal = el('span', 'temp-val temp-max');
            maxVal.textContent = d.tempMax + '\u00B0';
            box.appendChild(maxVal);

            var minVal = el('span', 'temp-val temp-min');
            minVal.textContent = d.tempMin + '\u00B0';
            box.appendChild(minVal);

            tempRow.appendChild(box);
        });
        forecast.appendChild(tempRow);

        // -- Frostgefahr --
        forecast.appendChild(txt('div', 'section-title', 'Frostgefahr in den Tallagen'));
        var frostRow = el('div', 'frost-row');
        days.forEach(function(d) {
            var cell = el('div', 'frost-cell');
            // Show 4 blocks representing night/morning/afternoon/evening frost risk
            var slots = hoursByDay[days.indexOf(d)] || [];
            // Split into 4 periods of ~6h each
            var periods = [
                slots.slice(0, 2),   // 00-06
                slots.slice(2, 4),   // 06-12
                slots.slice(4, 6),   // 12-18
                slots.slice(6, 8)    // 18-24
            ];
            periods.forEach(function(pSlots) {
                var block = el('div', 'frost-block');
                if (pSlots.length > 0) {
                    var minT = Math.min.apply(null, pSlots.map(function(s) { return s.temperature; }));
                    block.className = 'frost-block ' + getFrostLevel(minT);
                } else {
                    block.className = 'frost-block frost-none';
                }
                cell.appendChild(block);
            });
            frostRow.appendChild(cell);
        });
        forecast.appendChild(frostRow);

        // -- Schneefallgrenze --
        forecast.appendChild(txt('div', 'section-title', 'Schneefallgrenze'));
        var snowRow = el('div', 'snow-row');
        days.forEach(function(d) {
            var cell = el('div');
            cell.textContent = d.snowLevel + ' m';
            snowRow.appendChild(cell);
        });
        forecast.appendChild(snowRow);

        // -- Wind --
        forecast.appendChild(txt('div', 'section-title', 'Wind (B\u00F6en)'));
        var windRow = el('div', 'wind-row');
        days.forEach(function(d) {
            var cell = el('div');
            cell.textContent = d.windGust + ' km/h';
            windRow.appendChild(cell);
        });
        forecast.appendChild(windRow);

        // -- Neuschnee --
        forecast.appendChild(txt('div', 'section-title', 'Neuschnee'));
        var newSnowRow = el('div', 'snow-row');
        days.forEach(function(d) {
            var cell = el('div');
            cell.textContent = d.freshSnow > 0 ? d.freshSnow + ' cm' : '-';
            newSnowRow.appendChild(cell);
        });
        forecast.appendChild(newSnowRow);

        content.appendChild(forecast);

        // Footer
        var footer = el('div', 'footer-info');
        var ts = el('div', 'timestamp');
        ts.textContent = 'Ausgegeben am: ' + new Date().toLocaleDateString('de-AT', {
            day: '2-digit', month: '2-digit', year: 'numeric'
        }) + ', ' + new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit' });
        footer.appendChild(ts);

        var link = el('div');
        link.style.marginTop = '4px';
        link.style.fontSize = '0.8rem';
        var a = el('a');
        a.href = 'https://wetter.provinz.bz.it/de/gemeindewetter/sterzing?tl=144000000';
        a.textContent = 'Originalseite auf wetter.provinz.bz.it';
        var b = el('p');
        b.textContent = 'Privatprojekt, nur für den Eigengebrauch bestimmt (simuliert altes layout)';
        b.style.fontSize = "8px"
        link.appendChild(a);
        footer.appendChild(link);
        footer.appendChild(b);

        content.appendChild(footer);

        // Legend
        var legend = el('div');
        legend.style.padding = '12px 20px';
        legend.style.fontSize = '0.75rem';
        legend.style.color = '#888';

        var legendTitle = el('div');
        legendTitle.style.fontWeight = '700';
        legendTitle.style.marginBottom = '4px';
        legendTitle.textContent = 'Legende Frostgefahr:';
        legend.appendChild(legendTitle);

        var legendItems = el('div');
        legendItems.style.display = 'flex';
        legendItems.style.gap = '12px';
        legendItems.style.flexWrap = 'wrap';

        var frostLegend = [
            ['frost-none', 'Kein Frost (\u22653\u00B0C)'],
            ['frost-light', 'Leicht (0-3\u00B0C)'],
            ['frost-moderate', 'M\u00E4\u00DFig (-3 bis 0\u00B0C)'],
            ['frost-severe', 'Stark (-7 bis -3\u00B0C)'],
            ['frost-extreme', 'Sehr stark (<-7\u00B0C)']
        ];
        frostLegend.forEach(function(item) {
            var span = el('span');
            span.style.display = 'flex';
            span.style.alignItems = 'center';
            span.style.gap = '4px';

            var block = el('span', 'frost-block ' + item[0]);
            block.style.display = 'inline-block';
            span.appendChild(block);

            var label = document.createTextNode(item[1]);
            span.appendChild(label);

            legendItems.appendChild(span);
        });
        legend.appendChild(legendItems);
        content.appendChild(legend);
    }

    function loadMunicipality(id) {
        var mun = MUNICIPALITIES.find(function(m) { return m.id === id; });
        var name = mun ? mun.n : 'Gemeindewetter';
        document.getElementById('title').textContent = 'Gemeindewetter - ' + name;

        var content = document.getElementById('content');
        content.textContent = '';
        var loading = el('div', 'loading');
        loading.textContent = 'Wetterdaten werden geladen...';
        content.appendChild(loading);

        fetch(BASE_URL + id + '.json?cb=' + Date.now())
            .then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(render)
            .catch(function(err) {
                content.textContent = '';
                var errDiv = el('div', 'loading');
                errDiv.style.color = '#e74c3c';
                errDiv.textContent = 'Fehler: ' + err.message;
                content.appendChild(errDiv);
            });
    }

    // Init dropdown
    var select = document.getElementById('municipality-select');
    MUNICIPALITIES.forEach(function(m) {
        var opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.n;
        if (m.id === DEFAULT_ID) opt.selected = true;
        select.appendChild(opt);
    });
    select.addEventListener('change', function() {
        loadMunicipality(this.value);
    });

    // Load default
    loadMunicipality(DEFAULT_ID);
    </script>
</body>
</html>
